<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing — RxSharp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Serif+Display&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .post-list {
      display: flex;
      flex-direction: column;
    }

    .post-entry {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 1.1rem 0;
      border-bottom: 0.5px solid var(--border);
      text-decoration: none;
      color: inherit;
    }

    .post-entry:first-child {
      border-top: 0.5px solid var(--border);
    }

    .post-entry:hover .post-title {
      color: var(--text-muted);
    }

    .post-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .post-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      transition: color var(--transition-fast);
    }

    .post-tag {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-light);
    }

    .post-date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-faint);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .writing-intro {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 480px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header>
      <a href="index.html" style="text-decoration:none;">
        <div class="wordmark"><span>Rx</span>Sharp</div>
      </a>
      <nav>
        <a href="index.html#about">About</a>
        <a href="index.html#work">Work</a>
        <a href="writing.html">Writing</a>
        <a href="index.html#contact">Contact</a>
      </nav>
    </header>

    <!-- WRITING INDEX -->
    <section class="hero">
      <p class="eyebrow">Writing</p>
      <h1>Notes &amp;<br>observations.</h1>
      <p class="writing-intro">Thoughts on building Dosecraft, clinical pharmacy, and learning software development from scratch. Updated irregularly.</p>
    </section>

    <section class="section">
      <div class="post-list">

        <!-- POST ENTRIES — duplicate this block for each new post -->
        <a class="post-entry" href="posts/building-in-public.html">
          <div class="post-left">
            <span class="post-title">Building in Public: Why I'm Documenting This</span>
            <span class="post-tag">Dev journey</span>
          </div>
          <span class="post-date">Jun 2026</span>
        </a>

        <!-- Add more posts above this comment -->

      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <span class="footer-name">rxsharp.com</span>
      <a class="footer-contact" href="mailto:russellsharp8@gmail.com">russellsharp8@gmail.com</a>
    </footer>

  </div>
</body>
</html>
